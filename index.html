<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Contoh HTML Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Halo Dunia 👋</h1>
        <p>Ini contoh HTML sederhana</p>
        <button onclick="klikSaya()">Klik Saya</button>
    </div>

    <script>
        function klikSaya() {
            alert("Tombol diklik!");
        }
    </script>

</body>
</html>
